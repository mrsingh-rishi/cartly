services:
  - type: web
    name: cartly-api
    runtime: node
    plan: free
    rootDir: .
    buildCommand: NODE_ENV=development pnpm install --frozen-lockfile && pnpm --filter @cartly/shared build && pnpm --filter @cartly/api build
    startCommand: pnpm --filter @cartly/api start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: FRONTEND_ORIGIN
        sync: false
      - key: ADMIN_API_KEY
        sync: false
